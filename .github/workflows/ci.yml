# originally copied from https://github.com/BurntSushi/ripgrep/blob/master/.github/workflows/ci.yml
name: ci
on:
  pull_request:
  push:
    # branches:
    # - master
    tags:
    - v*
  schedule:
  - cron: '00 01 * * *'
jobs:
  build-ruby-version-tests:
    name: Build, test, and upload test binaries
    env:
      CARGO: cargo
      TARGET_FLAGS: --target ${{ matrix.target }}
      RUST_BACKTRACE: 1
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build:
        - linux
        include:
        - build: linux
          os: ubuntu-20.04
          target: x86_64-unknown-linux-gnu
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 2.7.2
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true
    - name: Install Rust toolchain target
      run: |
        rustup target add ${{ matrix.target }}
    - name: Cargo Cache
      uses: actions/cache@v2.1.4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-${{ matrix.target }}-cargo0-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.target }}-cargo0-
    - name: Show command used for Cargo
      run: |
        echo "cargo command is: ${{ env.CARGO }}"
        echo "target flag is: ${{ env.TARGET_FLAGS }}"

    - name: Build rbspy
      run: ${{ env.CARGO }} build --release --locked --verbose --workspace ${{ env.TARGET_FLAGS }}

    - name: Prepare binary for upload
      run: |
        test_binary=$(cargo test --no-run --message-format=json 2>/dev/null | grep '"executable":' | tail -1 | jq '.executable')
        cp $test_binary rbspy-test

    - name: Upload Linux and macOS Binaries
      uses: actions/upload-artifact@v2
      with:
        name: rbspy-test
        path: rbspy-test

  ruby-version-tests:
    runs-on: ubuntu-latest
    needs: [build-ruby-version-tests]
    strategy:
      matrix:
        - { ruby_version: 1.9.3 }
        - { ruby_version: 2.0.0 }
        - { ruby_version: 2.1.0 }
        - { ruby_version: 2.2.0 }
        - { ruby_version: 2.3.0 }
        - { ruby_version: 2.4.0 }
        - { ruby_version: 2.5.0 }
        - { ruby_version: 2.7.0 }
        - { ruby_version: 3.0.0 }
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby_version }}
    - name: Run tests
      timeout-minutes: 5
      run: cargo test --release --verbose

